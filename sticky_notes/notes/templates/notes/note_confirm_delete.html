{% extends 'base.html' %}

{% block title %}
Sticky Notes - Delete Note
{% endblock %}

{% block content %}
<h2>Delete Note</h2>
<p>Are you sure you want to delete <strong>"{{ note.title }}"</strong>?</p>

<form method="post" class="note-form">
  {% csrf_token %}
  <button type="submit" class="btn btn-danger">Yes, Delete</button>
  <a href="{% url 'note_list' %}" class="btn">Cancel</a>
</form>
{% endblock %}
